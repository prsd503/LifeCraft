<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LifeCraft Collage Studio Pro</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#ff477e">
    <style>
        :root {
            --primary: #ff477e;
            --secondary: #ff85a2;
            --bg: #f0f2f5;
            --card-bg: #ffffff;
            --text: #2b2d42;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background: var(--bg); color: var(--text); padding: 15px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        
        header { text-align: center; margin-bottom: 15px; }
        header h1 { color: var(--primary); font-size: 1.8rem; text-shadow: 1px 1px 2px rgba(0,0,0,0.1); }

        .app-container { width: 100%; max-width: 500px; background: var(--card-bg); padding: 20px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); }
        
        .preview-area { width: 100%; aspect-ratio: 1; background: #e9ecef; border-radius: 15px; overflow: hidden; position: relative; margin-bottom: 15px; display: flex; align-items: center; justify-content: center; }
        canvas { width: 100%; height: 100%; object-fit: contain; }

        .controls { display: flex; flex-direction: column; gap: 12px; }
        .row { display: flex; gap: 10px; align-items: center; }
        
        label, button { display: flex; align-items: center; justify-content: center; padding: 12px; border-radius: 12px; border: none; font-weight: bold; font-size: 0.95rem; cursor: pointer; transition: all 0.2s ease; flex: 1; text-align: center; }
        
        .btn-upload { background: var(--secondary); color: white; }
        .btn-action { background: var(--primary); color: white; }
        .btn-secondary { background: #4a4e69; color: white; }
        
        select, input[type="number"], input[type="range"] { width: 100%; padding: 10px; border-radius: 12px; border: 2px solid #ddd; font-size: 0.95rem; outline: none; background: #fff; }
        
        .edit-box { background: #fff0f3; padding: 12px; border-radius: 12px; border: 1px solid var(--secondary); margin-top: 5px; }
        .edit-box h3 { font-size: 0.9rem; margin-bottom: 8px; color: var(--primary); }
        .slider-group { display: flex; flex-direction: column; gap: 5px; margin-bottom: 8px; font-size: 0.85rem; }

        .audio-section { background: #f8f9fa; padding: 12px; border-radius: 12px; border: 1px dashed #ccc; }

        #status { text-align: center; font-size: 0.85rem; font-weight: bold; color: var(--primary); min-height: 20px; margin-top: 5px; }
        input[type="file"] { display: none; }
    </style>
</head>
<body>

    <header>
        <h1>✨ LifeCraft Studio ✨</h1>
    </header>

    <div class="app-container">
        <div class="preview-area">
            <canvas id="collageCanvas" width="800" height="800"></canvas>
        </div>

        <div id="status">Ready! Upload some photos.</div>

        <div class="controls">
            <div class="row">
                <label class="btn-upload">
                    📸 Add Photos
                    <input type="file" id="imageInput" multiple accept="image/*">
                </label>
                <button class="btn-secondary" id="shuffleBtn">🎲 Shuffle Style</button>
            </div>

            <div class="row">
                <select id="themeSelect">
                    <option value="none">No Theme (Clean)</option>
                    <option value="birthday">🎂 Happy Birthday</option>
                    <option value="anniversary">❤️ Happy Anniversary</option>
                    <option value="travel">✈️ Wanderlust / Travel</option>
                    <option value="congrats">🎉 Congratulations</option>
                </select>
            </div>

            <!-- Image Customizer Section -->
            <div class="edit-box" id="editBox" style="display:none;">
                <h3>🖼️ Adjust Selected Image</h3>
                <div class="slider-group">
                    <label>Select Photo to Edit:</label>
                    <select id="photoIndexSelect"></select>
                </div>
                <div class="slider-group">
                    <label>Size (Scale): <span id="scaleVal">1.0</span>x</label>
                    <input type="range" id="scaleSlider" min="0.2" max="2.5" step="0.1" value="1">
                </div>
                <div class="slider-group">
                    <label>Angle (Rotation): <span id="angleVal">0</span>°</label>
                    <input type="range" id="angleSlider" min="-180" max="180" step="5" value="0">
                </div>
            </div>

            <div class="row">
                <button class="btn-action" id="downloadImgBtn">📥 Download Image</button>
            </div>

            <div class="audio-section">
                <h3>🎵 Video Generation Options</h3>
                <div class="row" style="margin-bottom: 8px;">
                    <label class="btn-upload" style="background: #6c757d; font-size: 0.85rem; padding: 8px;">
                        🎵 Choose Audio
                        <input type="file" id="audioInput" accept="audio/*">
                    </label>
                    <div style="flex: 1; display: flex; align-items: center; gap: 5px;">
                        <input type="number" id="durationInput" value="5" min="3" max="30">
                        <span style="font-size: 0.85rem;">Secs</span>
                    </div>
                </div>
                <button class="btn-action" id="downloadVidBtn" style="background: #2a9d8f;">🎥 Export WebM/MP4 Video</button>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('collageCanvas');
        const ctx = canvas.getContext('2d');
        const imageInput = document.getElementById('imageInput');
        const themeSelect = document.getElementById('themeSelect');
        const shuffleBtn = document.getElementById('shuffleBtn');
        const downloadImgBtn = document.getElementById('downloadImgBtn');
        const audioInput = document.getElementById('audioInput');
        const durationInput = document.getElementById('durationInput');
        const downloadVidBtn = document.getElementById('downloadVidBtn');
        const statusText = document.getElementById('status');
        
        // Transform elements
        const editBox = document.getElementById('editBox');
        const photoIndexSelect = document.getElementById('photoIndexSelect');
        const scaleSlider = document.getElementById('scaleSlider');
        const angleSlider = document.getElementById('angleSlider');
        const scaleVal = document.getElementById('scaleVal');
        const angleVal = document.getElementById('angleVal');

        let loadedImages = []; 
        let currentLayout = 'grid'; 

        const themes = {
            none: { bg: '#ffffff', text: '' },
            birthday: { bg: '#fff0f3', text: 'HAPPY BIRTHDAY 🎉', color: '#ff477e' },
            anniversary: { bg: '#fff0f5', text: 'HAPPY ANNIVERSARY ❤️', color: '#d90429' },
            travel: { bg: '#e0f1f4', text: 'EXPLORE THE WORLD ✈️', color: '#0077b6' },
            congrats: { bg: '#fdf0d5', text: 'CONGRATULATIONS 🌟', color: '#7209b7' }
        };

        imageInput.addEventListener('change', (e) => {
            const files = Array.from(e.target.files);
            loadedImages = [];
            photoIndexSelect.innerHTML = '';
            
            let loadedCount = 0;
            files.forEach((file, index) => {
                const img = new Image();
                img.src = URL.createObjectURL(file);
                img.onload = () => {
                    loadedImages.push({
                        element: img,
                        scale: 1.0,
                        angle: 0,
                        baseX: 0,
                        baseY: 0
                    });
                    
                    let opt = document.createElement('option');
                    opt.value = loadedCount;
                    opt.innerText = `Photo ${loadedCount + 1}`;
                    photoIndexSelect.appendChild(opt);

                    loadedCount++;
                    if (loadedCount === files.length) {
                        statusText.innerText = `${loadedImages.length} image(s) loaded!`;
                        editBox.style.display = 'block';
                        updateLayoutCoordinates();
                        drawCollage();
                    }
                };
            });
        });

        function updateLayoutCoordinates() {
            if (loadedImages.length === 0) return;
            
            if (currentLayout === 'grid') {
                let cols = Math.ceil(Math.sqrt(loadedImages.length));
                let rows = Math.ceil(loadedImages.length / cols);
                let w = canvas.width / cols;
                let h = (canvas.height - 100) / rows;

                loadedImages.forEach((imgObj, i) => {
                    let col = i % cols;
                    let row = Math.floor(i / cols);
                    imgObj.baseX = col * w + w / 2;
                    imgObj.baseY = row * h + h / 2 + 10;
                    imgObj.width = w - 20;
                    imgObj.height = h - 20;
                });
            } else if (currentLayout === 'rows') {
                let h = (canvas.height - 120) / loadedImages.length;
                loadedImages.forEach((imgObj, i) => {
                    imgObj.baseX = canvas.width / 2;
                    imgObj.baseY = (i * h) + h / 2 + 20;
                    imgObj.width = canvas.width - 40;
                    imgObj.height = h - 20;
                });
            } else if (currentLayout === 'scattered') {
                loadedImages.forEach((imgObj) => {
                    imgObj.baseX = Math.random() * (canvas.width - 300) + 150;
                    imgObj.baseY = Math.random() * (canvas.height - 400) + 150;
                    imgObj.width = 240;
                    imgObj.height = 240;
                });
            }
        }

        // Handle adjustments dynamically
        photoIndexSelect.addEventListener('change', () => {
            const imgObj = loadedImages[photoIndexSelect.value];
            if(imgObj) {
                scaleSlider.value = imgObj.scale;
                angleSlider.value = imgObj.angle;
                scaleVal.innerText = imgObj.scale;
                angleVal.innerText = imgObj.angle;
            }
        });

        scaleSlider.addEventListener('input', (e) => {
            const imgObj = loadedImages[photoIndexSelect.value];
            if(imgObj) {
                imgObj.scale = parseFloat(e.target.value);
                scaleVal.innerText = imgObj.scale;
                drawCollage();
            }
        });

        angleSlider.addEventListener('input', (e) => {
            const imgObj = loadedImages[photoIndexSelect.value];
            if(imgObj) {
                imgObj.angle = parseInt(e.target.value);
                angleVal.innerText = imgObj.angle;
                drawCollage();
            }
        });

        themeSelect.addEventListener('change', drawCollage);
        shuffleBtn.onclick = () => {
            const layouts = ['grid', 'scattered', 'rows'];
            currentLayout = layouts[(layouts.indexOf(currentLayout) + 1) % layouts.length];
            statusText.innerText = `Switched to ${currentLayout} layout!`;
            updateLayoutCoordinates();
            drawCollage();
        };

        function drawCollage() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            const theme = themes[themeSelect.value] || themes.none;
            
            ctx.fillStyle = theme.bg;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            if (loadedImages.length === 0) {
                ctx.fillStyle = "#888";
                ctx.font = "30px Arial";
                ctx.textAlign = "center";
                ctx.fillText("Tap 'Add Photos' to Start", canvas.width/2, canvas.height/2);
                return;
            }

            loadedImages.forEach((imgObj) => {
                ctx.save();
                ctx.translate(imgObj.baseX, imgObj.baseY);
                ctx.rotate((imgObj.angle * Math.PI) / 180);
                
                let finalW = imgObj.width * imgObj.scale;
                let finalH = imgObj.height * imgObj.scale;

                if (currentLayout === 'scattered') {
                    ctx.fillStyle = 'white';
                    ctx.shadowColor = 'rgba(0,0,0,0.15)';
                    ctx.shadowBlur = 10;
                    ctx.fillRect(-finalW/2 - 10, -finalH/2 - 10, finalW + 20, finalH + 40);
                }

                ctx.drawImage(imgObj.element, -finalW / 2, -finalH / 2, finalW, finalH);
                ctx.restore();
            });

            if (theme.text) {
                ctx.fillStyle = theme.color;
                ctx.fillRect(0, canvas.height - 90, canvas.width, 90);
                ctx.fillStyle = '#ffffff';
                ctx.font = 'bold 36px Arial';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(theme.text, canvas.width / 2, canvas.height - 45);
            }
        }

        downloadImgBtn.onclick = () => {
            if(loadedImages.length === 0) return alert("Please add images first!");
            const link = document.createElement('a');
            link.download = 'collage.jpg';
            link.href = canvas.toDataURL('image/jpeg', 0.9);
            link.click();
        };

        // Fixed Mobile-Friendly Video Rendering Loop
        downloadVidBtn.onclick = async () => {
            if(loadedImages.length === 0) return alert("Please add images first!");
            if(!audioInput.files[0]) return alert("Please select an audio file!");

            statusText.innerText = "Encoding mobile-friendly video... Please wait.";
            const duration = parseInt(durationInput.value) || 5;
            
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const fileReader = new FileReader();
            
            fileReader.onload = async (e) => {
                const audioBuffer = await audioCtx.decodeAudioData(e.target.result);
                const source = audioCtx.createBufferSource();
                source.buffer = audioBuffer;
                
                const dest = audioCtx.createMediaStreamDestination();
                source.connect(dest);
                
                const canvasStream = canvas.captureStream(25); 
                const combinedStream = new MediaStream([
                    ...canvasStream.getVideoTracks(),
                    ...dest.stream.getAudioTracks()
                ]);

                // Fallback architecture to optimize container playback on Android/iOS
                let options = { mimeType: 'video/webm;codecs=vp8,opus' };
                if (!MediaRecorder.isTypeSupported(options.mimeType)) {
                    options = { mimeType: 'video/webm' };
                }

                const mediaRecorder = new MediaRecorder(combinedStream, options);
                const chunks = [];

                mediaRecorder.ondataavailable = (e) => {
                    if (e.data && e.data.size > 0) chunks.push(e.data);
                };
                
                mediaRecorder.onstop = () => {
                    // Exported with explicit system container typing so Android can safely parse it
                    const blob = new Blob(chunks, { type: 'video/webm' });
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = 'collage_video.webm'; 
                    a.click();
                    statusText.innerText = "Saved! Use VLC/Default Player to play.";
                    source.stop();
                };

                mediaRecorder.start();
                source.start(0);

                let startTime = Date.now();
                let interval = setInterval(() => {
                    drawCollage(); 
                    if (Date.now() - startTime > duration * 1000) {
                        clearInterval(interval);
                        mediaRecorder.stop();
                    }
                }, 40);
            };
            fileReader.readAsArrayBuffer(audioInput.files[0]);
        };

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').then(() => console.log('Service Worker Live'));
        }
    </script>
</body>
</html>
