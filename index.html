  <!-- 1. LIVE ERROR TRACKING HEADSCRIPT -->
  <script>
    window.addEventListener('error', function(e) {
      const debugBox = document.getElementById('runtimeDebugLog');
      if (debugBox) {
        debugBox.style.display = 'block';
        const target = e.target || e.srcElement;
        if (target && (target.tagName === 'SCRIPT' || target.tagName === 'LINK')) {
          debugBox.innerHTML += `<div>❌ <b>Resource Blocked:</b> Failed to load library from: <br><small>${target.src || target.href}</small></div>`;
        } else {
          debugBox.innerHTML += `<div>❌ <b>Script Bug:</b> ${e.message}<br><small>at ${e.filename || 'unknown'}:${e.lineno || 0}</small></div>`;
        }
      }
    }, true); 

    window.addEventListener('unhandledrejection', function(e) {
      const debugBox = document.getElementById('runtimeDebugLog');
      if (debugBox) {
        debugBox.style.display = 'block';
        debugBox.innerHTML += `<div>⚠️ <b>Promise Failure:</b> ${e.reason}</div>`;
      }
    });
  </script>

  <script>
    let canvas;
    let uploadedImages = [];
    let borderFrame = null;
    let textObject = null;
    let selectedAudioBuffer = null;
    let audioContext = null;

    // Layout cycling modes for the Mix Positions button
    const layoutModes = ['circle','grid','fan','stack','random'];
    let currentLayoutIndex = 0; // cycles each button press

    function updateLayerButtonsState() {
      const hasImages = uploadedImages.length > 0;
      const bringFrontBtn = document.getElementById('bringFrontBtn');
      const sendBackBtn = document.getElementById('sendBackBtn');
      
      if (hasImages) {
        bringFrontBtn.classList.remove('disabled-state');
        sendBackBtn.classList.remove('disabled-state');
      } else {
        bringFrontBtn.classList.add('disabled-state');
        sendBackBtn.classList.add('disabled-state');
      }
    }

    function onObjectSelected(e) {
      if (e.target && e.target.type === 'image') {
        document.getElementById('transformControls').style.display = 'block';
        document.getElementById('angleSlider').value = Math.round(e.target.angle || 0);
        document.getElementById('scaleSlider').value = e.target.scaleX || 1;
      } else {
        document.getElementById('transformControls').style.display = 'none';
      }
    }

    function deleteSelectedObj() {
      if(!canvas) return;
      let active = canvas.getActiveObject();
      if (active) {
        canvas.remove(active);
        canvas.discardActiveObject();
        updateUploadedImagesFromCanvas();
        arrangeLayerOrder();
        updateLayerButtonsState();
        canvas.renderAll();
        document.getElementById('statusLog').innerText = "Removed selected photo.";
      }
    }

    function clearAllImages() {
      if (!canvas) return;
      canvas.clear();
      canvas.setBackgroundColor('#ffffff', canvas.renderAll.bind(canvas));
      uploadedImages = [];
      textObject = null;
      borderFrame = null;
      updateLayerButtonsState();
      document.getElementById('statusLog').innerText = "Cleared all photos!";
    }

    // BULLETPROOF SECURE MOBILE IMAGE LOADER
    function handleImageFiles(files) {
      if(!canvas || !files.length) return;
      document.getElementById('statusLog').innerText = "Processing media layers...";
      
      for (let i = 0; i < files.length; i++) {
        const reader = new FileReader();
        reader.onload = function(event) {
          fabric.util.loadImage(event.target.result, function(imgElement) {
            if (!imgElement) {
              document.getElementById('statusLog').innerText = "⚠️ Image decoding fault.";
              return;
            }
            const fabricImg = new fabric.Image(imgElement, {
              left: 40 + (uploadedImages.length * 30) % 140,
              top: 40 + (uploadedImages.length * 30) % 140,
              cornerColor: '#4ECDC4',
              cornerSize: 24,
              transparentCorners: false,
              hasRotatingPoint: false
            });
            fabricImg.scaleToWidth(140);
            canvas.add(fabricImg);
            updateUploadedImagesFromCanvas();
            arrangeLayerOrder();
            updateLayerButtonsState();
            canvas.renderAll();
            document.getElementById('statusLog').innerText = "Photos successfully loaded!";
          });
        };
        reader.readAsDataURL(files[i]);
      }
    }

    function arrangeLayerOrder() {
      if(!canvas) return;
      // Keep borderFrame at the very back, then place images in the order of uploadedImages array
      const objs = canvas.getObjects();
      // Ensure borderFrame exists and is at index 0
      if (borderFrame && canvas.getObjects().indexOf(borderFrame) !== 0) {
        try { canvas.sendToBack(borderFrame); } catch(e){}
      }

      // Place images in a stable stacking order: uploadedImages is considered bottom-to-top
      for (let i = 0; i < uploadedImages.length; i++) {
        const img = uploadedImages[i];
        if (!img) continue;
        // target index: leave room for borderFrame at index 0 when present
        const baseIndex = borderFrame ? 1 : 0;
        try { canvas.moveTo(img, baseIndex + i); } catch(e){}
      }

      // Put textObject on top if present
      if (textObject && canvas.getObjects().indexOf(textObject) !== canvas.getObjects().length - 1) {
        try { canvas.bringToFront(textObject); } catch(e){}
      }

      canvas.renderAll();
    }

    // Rebuild uploadedImages array from canvas stacking order (bottom-to-top)
    function updateUploadedImagesFromCanvas() {
      if (!canvas) return;
      uploadedImages = canvas.getObjects().filter(o => o.type === 'image');
    }

    // Layer manipulation helpers exposed to UI
    function bringForwardSelected() {
      if (!canvas) return;
      const active = canvas.getActiveObject();
      if (!active || active.type !== 'image') return;
      try { canvas.bringForward(active); } catch(e){}
      updateUploadedImagesFromCanvas();
      arrangeLayerOrder();
      canvas.renderAll();
      document.getElementById('statusLog').innerText = "Moved image forward.";
    }

    function sendBackwardSelected() {
      if (!canvas) return;
      const active = canvas.getActiveObject();
      if (!active || active.type !== 'image') return;
      try { canvas.sendBackwards(active); } catch(e){}
      updateUploadedImagesFromCanvas();
      arrangeLayerOrder();
      canvas.renderAll();
      document.getElementById('statusLog').innerText = "Moved image backward.";
    }

    function bringToFrontSelected() {
      if (!canvas) return;
      const active = canvas.getActiveObject();
      if (!active || active.type !== 'image') return;
      try { canvas.bringToFront(active); } catch(e){}
      updateUploadedImagesFromCanvas();
      arrangeLayerOrder();
      canvas.renderAll();
      document.getElementById('statusLog').innerText = "Image brought to front.";
    }

    function sendToBackSelected() {
      if (!canvas) return;
      const active = canvas.getActiveObject();
      if (!active || active.type !== 'image') return;
      // Move to just above the borderFrame (if it exists) so border remains the outermost behind images
      try {
        if (borderFrame) {
          const borderIndex = canvas.getObjects().indexOf(borderFrame);
          const targetIndex = borderIndex >= 0 ? borderIndex + 1 : 0;
          canvas.moveTo(active, targetIndex);
        } else {
          canvas.sendToBack(active);
        }
      } catch(e){}
      updateUploadedImagesFromCanvas();
      arrangeLayerOrder();
      canvas.renderAll();
      document.getElementById('statusLog').innerText = "Image sent to back (above frame).";
    }
