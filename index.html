 <!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LifeCraft</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#4ECDC4">
  <style>
    :root {
      --primary: #FF6B6B;
      --secondary: #4ECDC4;
      --accent: #FFE66D;
      --dark: #2F3E46;
      --light: #F7FFF7;
      --radius: 16px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    }

    body {
      background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
      color: var(--dark);
      min-height: 100vh;
      padding-bottom: 40px;
    }

    header {
      background: linear-gradient(135deg, var(--primary), #ff8e8e);
      color: white;
      text-align: center;
      padding: 20px 15px;
      border-bottom-left-radius: var(--radius);
      border-bottom-right-radius: var(--radius);
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
      margin-bottom: 20px;
    }

    header h1 {
      font-size: 1.8rem;
      margin-bottom: 5px;
      text-shadow: 1px 1px 2px rgba(0,0,0,0.2);
    }

    .container {
      width: 92%;
      max-width: 500px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    .card {
      background: white;
      padding: 15px;
      border-radius: var(--radius);
      box-shadow: 0 8px 20px rgba(0,0,0,0.06);
    }

    .card-title {
      font-size: 1rem;
      font-weight: 600;
      margin-bottom: 12px;
      color: #555;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    /* Form Elements */
    label {
      display: block;
      margin-bottom: 6px;
      font-size: 0.85rem;
      font-weight: bold;
    }

    select, input[type="number"] {
      width: 100%;
      padding: 10px;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      font-size: 0.95rem;
      margin-bottom: 12px;
      background-color: var(--light);
      outline: none;
      transition: border-color 0.2s;
    }

    select:focus {
      border-color: var(--secondary);
    }

    /* Media Inputs Custom */
    .file-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 12px;
    }

    .file-btn {
      background: var(--light);
      border: 2px dashed var(--secondary);
      padding: 12px;
      text-align: center;
      border-radius: 10px;
      cursor: pointer;
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--dark);
      transition: all 0.2s;
    }

    .file-btn:active {
      transform: scale(0.97);
    }

    /* Collage Canvas Container */
    #canvas-container {
      position: relative;
      width: 100%;
      aspect-ratio: 1 / 1;
      background: #eef2f3;
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: inset 0 0 10px rgba(0,0,0,0.05);
    }

    canvas {
      width: 100%;
      height: 100%;
      display: block;
    }

    /* Style Presets */
    .style-row {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding-bottom: 5px;
      margin-bottom: 10px;
    }

    .style-chip {
      background: #eee;
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 0.85rem;
      white-space: nowrap;
      cursor: pointer;
      font-weight: 500;
    }

    .style-chip.active {
      background: var(--primary);
      color: white;
    }

    /* Actions Buttons */
    .btn {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: bold;
      cursor: pointer;
      color: white;
      transition: transform 0.1s, opacity 0.2s;
      margin-bottom: 8px;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 8px;
    }

    .btn:active { transform: scale(0.98); }
    .btn-primary { background: var(--primary); }
    .btn-secondary { background: var(--secondary); }
    
    /* Custom Modal */
    .modal-overlay {
      position: fixed;
      top:0; left:0; right:0; bottom:0;
      background: rgba(0,0,0,0.6);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
      padding: 20px;
    }
    .modal-overlay.active {
      opacity: 1;
      pointer-events: auto;
    }
    .modal {
      background: white;
      padding: 20px;
      border-radius: var(--radius);
      width: 100%;
      max-width: 400px;
      text-align: center;
      transform: translateY(20px);
      transition: transform 0.3s;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    }
    .modal-overlay.active .modal {
      transform: translateY(0);
    }
    .modal-title {
      font-size: 1.2rem;
      font-weight: bold;
      margin-bottom: 10px;
    }
    .modal-text {
      font-size: 0.95rem;
      color: #666;
      margin-bottom: 20px;
      line-height: 1.4;
    }
    
    /* Loading Spinner */
    .spinner {
      border: 4px solid rgba(0,0,0,0.1);
      width: 24px;
      height: 24px;
      border-radius: 50%;
      border-left-color: white;
      animation: spin 1s linear infinite;
      display: inline-block;
    }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    
    /* Utility hidden inputs */
    input[type="file"] { display: none; }
  </style>
</head>
<body>

  <header>
    <h1>🎨 LifeCraft 🎨</h1>
    <p>Craft your beautiful life events into timeless collages and videos</p>
  </header>

  <div class="container">
    
    <!-- Step 1: Configuration -->
    <div class="card">
      <div class="card-title">📐 Theme & Layout Options</div>
      
      <label>Select Celebration Theme</label>
      <select id="themeSelect">
        <option value="birthday">🎉 Happy Birthday</option>
        <option value="anniversary">❤️ Anniversary / Love</option>
        <option value="travel">✈️ Travel Adventure</option>
        <option value="generic">🌟 Elegant Minimalist</option>
      </select>

      <label>Choose Slice Grid Type</label>
      <div class="style-row" id="layoutRow">
        <div class="style-chip active" data-layout="grid">Standard Block</div>
        <div class="style-chip" data-layout="diagonal">Diagonal Slices</div>
        <div class="style-chip" data-layout="strips">Vertical Strips</div>
        <div class="style-chip" data-layout="random">Abstract Mix</div>
      </div>
    </div>

    <!-- Step 2: Media Picker -->
    <div class="card">
      <div class="card-title">📸 Import Your Media</div>
      <div class="file-grid">
        <label class="file-btn" for="photoCam">
          📸 Camera Capture
        </label>
        <label class="file-btn" for="photoGal">
          🖼️ Device Gallery
        </label>
      </div>
      <input type="file" id="photoCam" accept="image/*" capture="environment" multiple>
      <input type="file" id="photoGal" accept="image/*" multiple>
      
      <label class="file-btn" style="border-color: var(--primary); color: var(--primary);" for="audioInput">
        🎵 Optional Background Audio (.mp3)
      </label>
      <input type="file" id="audioInput" accept="audio/mp3">
      <div id="audioStatus" style="font-size:0.8rem; text-align:center; color:#777; margin-top:-5px;">No track loaded</div>
    </div>

    <!-- Canvas Preview Matrix -->
    <div class="card">
      <div class="card-title">👁️ Live Preview</div>
      <div id="canvas-container">
        <canvas id="collageCanvas" width="1080" height="1080"></canvas>
      </div>
    </div>

    <!-- Video settings and Export Actions -->
    <div class="card">
      <div class="card-title">💾 Output Engine</div>
      
      <label>Video Length (Seconds - only applies to MP4 video rendering)</label>
      <input type="number" id="videoDuration" value="5" min="2" max="30">

      <button class="btn btn-secondary" id="downloadImgBtn">📥 Download High-Res Image (PNG)</button>
      <button class="btn btn-primary" id="downloadVidBtn">🎥 Render & Download Video (MP4)</button>
    </div>

  </div>

  <!-- Custom Alert Modal View Structure -->
  <div class="modal-overlay" id="customModal">
    <div class="modal">
      <div class="modal-title" id="modalTitle">Notification</div>
      <div class="modal-text" id="modalBody">Message goes here.</div>
      <button class="btn btn-secondary" style="margin:0;" onclick="closeModal()">Awesome</button>
    </div>
  </div>

  <script>
    // Register PWA Service Worker
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js').catch(err => console.log(err));
      });
    }

    // App State Configuration Variables
    const canvas = document.getElementById('collageCanvas');
    const ctx = canvas.getContext('2d');
    let loadedImages = [];
    let currentTheme = 'birthday';
    let currentLayout = 'grid';
    let userAudioBuffer = null;
    let audioContext = null;

    // Theme Custom CSS Configurations & Stickers Assets Frameworks
    const themes = {
      birthday: {
        bg: '#FFF0F5',
        gradient: ['#FF6B6B', '#FFE66D'],
        decor: '✨ 🎉 HAPPY BIRTHDAY 🎂 🎈 ✨',
        textColor: '#D81B60'
      },
      anniversary: {
        bg: '#FFF0F2',
        gradient: ['#ff4e50', '#f9d423'],
        decor: '❤️ Happy Anniversary Always & Forever ❤️',
        textColor: '#B71C1C'
      },
      travel: {
        bg: '#E0F7FA',
        gradient: ['#4ECDC4', '#556270'],
        decor: '✈️ WANDERLUST • DISCOVER • EXPLORE 🗺️',
        textColor: '#006064'
      },
      generic: {
        bg: '#F7FFF7',
        gradient: ['#2F3E46', '#3A6073'],
        decor: '🌟 LIFE MOMENTS MEMORY COLLECTOR 🌟',
        textColor: '#2F3E46'
      }
    };

    // Modal Manager
    function showModal(title, text) {
      document.getElementById('modalTitle').innerText = title;
      document.getElementById('modalBody').innerText = text;
      document.getElementById('customModal').classList.add('active');
    }
    function closeModal() {
      document.getElementById('customModal').classList.remove('active');
    }

    // Trigger Processing Elements Pipeline
    document.getElementById('themeSelect').addEventListener('change', (e) => {
      currentTheme = e.target.value;
      renderCollage();
    });

    document.getElementById('layoutRow').addEventListener('click', (e) => {
      if(e.target.classList.contains('style-chip')) {
        document.querySelectorAll('.style-chip').forEach(c => c.classList.remove('active'));
        e.target.classList.add('active');
        currentLayout = e.target.dataset.layout;
        renderCollage();
      }
    });

    // File Input Handlers (Combined Camera and Gallery logic mapping)
    const loadFiles = (e) => {
      const files = e.target.files;
      if(!files.length) return;

      let itemsProcessed = 0;
      loadedImages = []; // Clear old items

      for(let i=0; i < files.length; i++) {
        const reader = new FileReader();
        reader.onload = (event) => {
          const img = new Image();
          img.onload = () => {
            loadedImages.push(img);
            itemsProcessed++;
            if(itemsProcessed === files.length) {
              showModal('Success 🎉', `${loadedImages.length} images loaded successfully! Rendering LifeCraft canvas.`);
              renderCollage();
            }
          };
          img.src = event.target.result;
        };
        reader.readAsDataURL(files[i]);
      }
    };

    document.getElementById('photoCam').addEventListener('change', loadFiles);
    document.getElementById('photoGal').addEventListener('change', loadFiles);

    // Audio input binary data extractor mapping
    document.getElementById('audioInput').addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (file) {
        document.getElementById('audioStatus').innerText = `Loaded: ${file.name.substring(0, 20)}...`;
        const reader = new FileReader();
        reader.onload = function(evt) {
          audioContext = new (window.AudioContext || window.webkitAudioContext)();
          audioContext.decodeAudioData(evt.target.result, (buffer) => {
            userAudioBuffer = buffer;
            showModal('Music Ready 🎵', 'Audio track successfully attached to LifeCraft MP4 generator.');
          });
        };
        reader.readAsArrayBuffer(file);
      }
    });

    // Core Canvas Generative Drawing Logic
    function renderCollage() {
      const activeTheme = themes[currentTheme];
      
      // Clean frame canvas buffer structure
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      
      // Draw Theme Border Background Architecture Frame
      ctx.fillStyle = activeTheme.bg;
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      const margin = 60;
      const innerW = canvas.width - (margin * 2);
      const innerH = canvas.height - (margin * 2 - 20);

      if(loadedImages.length === 0) {
        // Fallback default state presentation card framework logic rendering placeholder text
        ctx.fillStyle = "#bbb";
        ctx.font = "italic 36px Arial";
        ctx.textAlign = "center";
        ctx.fillText("Upload photos to construct live LifeCraft generation grid", canvas.width/2, canvas.height/2);
        drawDecorations(activeTheme);
        return;
      }

      ctx.save();
      // Establish Clipping Matrix boundary space wrapper layout architecture container
      let clipPath = new Path2D();
      clipPath.rect(margin, margin, innerW, innerH);
      ctx.clip(clipPath);

      // Render Layout Strategies
      if (currentLayout === 'grid') {
        renderGridLayout(innerW, innerH, margin);
      } else if (currentLayout === 'strips') {
        renderStripsLayout(innerW, innerH, margin);
      } else if (currentLayout === 'diagonal') {
        renderDiagonalLayout(innerW, innerH, margin);
      } else {
        renderRandomLayout(innerW, innerH, margin);
      }

      ctx.restore();
      drawDecorations(activeTheme);
    }

    // Dynamic Image Cover Crop Vector Calculator Utility Function Matrix alignment wrapper 
    function drawImageCover(img, sx, sy, sw, sh) {
      const imgRatio = img.width / img.height;
      const targetRatio = sw / sh;
      let dx, dy, dw, dh;

      if(imgRatio > targetRatio) {
        dh = img.height;
        dw = img.height * targetRatio;
        dx = (img.width - dw) / 2;
        dy = 0;
      } else {
        dw = img.width;
        dh = img.width / targetRatio;
        dx = 0;
        dy = (img.height - dh) / 2;
      }
      ctx.drawImage(img, dx, dy, dw, dh, sx, sy, sw, sh);
    }

    /* Layout Subroutines mapping dynamically against uploaded elements sizes arrays length objects loops */
    function renderGridLayout(w, h, m) {
      const count = loadedImages.length;
      const cols = Math.ceil(Math.sqrt(count));
      const rows = Math.ceil(count / cols);
      const cw = w / cols;
      const ch = h / rows;

      let idx = 0;
      for(let r=0; r<rows; r++) {
        for(let c=0; c<cols; c++) {
          if(idx >= count) break;
          drawImageCover(loadedImages[idx], m + (c*cw), m + (r*ch), cw - 4, ch - 4);
          idx++;
        }
      }
    }

    function renderStripsLayout(w, h, m) {
      const count = loadedImages.length;
      const cw = w / count;
      for(let i=0; i<count; i++) {
        drawImageCover(loadedImages[i], m + (i*cw), m, cw - 4, h);
      }
    }

    function renderDiagonalLayout(w, h, m) {
      const count = loadedImages.length;
      const segmentWidth = w / count;

      for (let i = 0; i < count; i++) {
        ctx.save();
        let path = new Path2D();
        if(i === 0) {
          path.moveTo(m, m);
          path.lineTo(m + segmentWidth + 50, m);
          path.lineTo(m + segmentWidth - 50, m + h);
          path.lineTo(m, m + h);
        } else if (i === count - 1) {
          path.moveTo(m + (i*segmentWidth) - 50, m);
          path.lineTo(m + w, m);
          path.lineTo(m + w, m + h);
          path.lineTo(m + (i*segmentWidth) + 50, m + h);
        } else {
          path.moveTo(m + (i*segmentWidth) - 50, m);
          path.lineTo(m + ((i+1)*segmentWidth) + 50, m);
          path.lineTo(m + ((i+1)*segmentWidth) - 50, m + h);
          path.lineTo(m + (i*segmentWidth) + 50, m + h);
        }
        path.closePath();
        ctx.clip(path);
        
        drawImageCover(loadedImages[i], m + (i*segmentWidth) - 50, m, segmentWidth + 100, h);
        ctx.restore();
      }
    }

    function renderRandomLayout(w, h, m) {
      const count = loadedImages.length;
      if(count === 1) {
        drawImageCover(loadedImages[0], m, m, w, h);
        return;
      }
      
      const midX = w / 2;
      const midY = h / 2;

      const points = [
        [m, m, midX, midY],
        [midX, m, w, midY],
        [m, midY, midX, h],
        [midX, midY, w, h]
      ];

      for(let i=0; i < Math.min(count, 4); i++) {
        let pts = points[i];
        drawImageCover(loadedImages[i], m + pts[0], m + pts[1], pts[2], pts[3]);
      }

      if(count > 4) {
        for(let i=4; i<count; i++) {
          let size = 250;
          ctx.save();
          ctx.shadowColor = 'rgba(0,0,0,0.3)';
          ctx.shadowBlur = 15;
          ctx.translate(m + (w/2), m + (h/2));
          ctx.rotate((i * 15) * Math.PI / 180);
          drawImageCover(loadedImages[i], -size/2, -size/2, size, size);
          ctx.strokeStyle = "white";
          ctx.lineWidth = 8;
          ctx.strokeRect(-size/2, -size/2, size, size);
          ctx.restore();
        }
      }
    }

    function drawDecorations(theme) {
      ctx.fillStyle = theme.textColor;
      ctx.font = "bold 32px Arial";
      ctx.textAlign = "center";
      ctx.fillText(theme.decor, canvas.width / 2, 42);
      ctx.fillText(theme.decor, canvas.width / 2, canvas.height - 20);
    }

    // Capture Image File Stream Downloader Action Pipeline
    document.getElementById('downloadImgBtn').addEventListener('click', () => {
      if(loadedImages.length === 0) {
        showModal('Error ❌', 'Please import files into the grid before requesting download triggers.');
        return;
      }
      const link = document.createElement('a');
      link.download = `LifeCraft_${currentTheme}.png`;
      link.href = canvas.toDataURL('image/png');
      link.click();
    });

    // Advanced MediaStream MP4 Video Assembler Engine Logic Pipeline Integration Framework
    document.getElementById('downloadVidBtn').addEventListener('click', async () => {
      if(loadedImages.length === 0) {
        showModal('Error ❌', 'Cannot generate an MP4 video tracking layer with empty visual states.');
        return;
      }

      const durationSec = parseInt(document.getElementById('videoDuration').value) || 5;
      const fps = 25;
      const totalFrames = durationSec * fps;
      
      const origBtnText = document.getElementById('downloadVidBtn').innerHTML;
      document.getElementById('downloadVidBtn').innerHTML = `<span class="spinner"></span> Rendering Video...`;
      document.getElementById('downloadVidBtn').disabled = true;

      const stream = canvas.captureStream(fps);
      
      let mediaRecorderOptions = { mimeType: 'video/mp4; codecs=vp9' };
      if (!MediaRecorder.isTypeSupported(mediaRecorderOptions.mimeType)) {
         mediaRecorderOptions = { mimeType: 'video/webm' }; 
      }

      let audioTrackStreamDestination;
      if (userAudioBuffer && audioContext) {
        audioTrackStreamDestination = audioContext.createMediaStreamDestination();
        let bufferSourceNode = audioContext.createBufferSource();
        bufferSourceNode.buffer = userAudioBuffer;
        bufferSourceNode.loop = true;
        bufferSourceNode.connect(audioTrackStreamDestination);
        bufferSourceNode.start();
        
        const audioTrack = a
