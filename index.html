<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LifeCraft Collage Studio Pro</title>
    <meta name="theme-color" content="#ff477e">
    <style>
        :root {
            --primary: #ff477e;
            --secondary: #ff85a2;
            --bg: #f0f2f5;
            --card-bg: #ffffff;
            --text: #2b2d42;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background: var(--bg); color: var(--text); padding: 15px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        
        header { text-align: center; margin-bottom: 15px; }
        header h1 { color: var(--primary); font-size: 1.8rem; text-shadow: 1px 1px 2px rgba(0,0,0,0.1); }

        .app-container { width: 100%; max-width: 500px; background: var(--card-bg); padding: 20px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); }
        .preview-area { width: 100%; aspect-ratio: 1; background: #e9ecef; border-radius: 15px; overflow: hidden; margin-bottom: 15px; display: flex; align-items: center; justify-content: center; }
        canvas { width: 100%; height: 100%; object-fit: contain; background: #fff; }

        .controls { display: flex; flex-direction: column; gap: 12px; }
        .row { display: flex; gap: 10px; align-items: center; }
        
        label, button { padding: 12px; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; flex: 1; text-align: center; color: white; }
        .btn-camera { background: #4cc9f0; }
        .btn-upload { background: var(--secondary); }
        .btn-action { background: var(--primary); }
        .btn-secondary { background: #4a4e69; }
        .btn-danger { background: #e63946; }

        input[type="text"], input[type="number"], select { width: 100%; padding: 12px; border-radius: 12px; border: 2px solid #ddd; }
        .section-box { background: #f8f9fa; padding: 12px; border-radius: 12px; border: 1px dashed #ccc; margin-top: 5px; }
        .slider-group { display: flex; flex-direction: column; gap: 5px; margin-bottom: 8px; }
        #status { text-align: center; font-size: 0.85rem; font-weight: bold; color: var(--primary); margin: 10px 0; }
        input[type="file"] { display: none; }
    </style>
</head>
<body>

    <header>
        <h1>✨ LifeCraft Studio Pro ✨</h1>
    </header>

    <div class="app-container">
        <div class="preview-area">
            <canvas id="collageCanvas" width="800" height="800"></canvas>
        </div>

        <div id="status">Add photos to begin!</div>

        <div class="controls">
            <div class="row">
                <label class="btn-camera">📸 Camera <input type="file" id="cameraInput" accept="image/*" capture="environment"></label>
                <label class="btn-upload">🖼️ Gallery <input type="file" id="imageInput" multiple accept="image/*"></label>
            </div>
            
            <button class="btn-secondary" id="shuffleBtn">🎲 Shuffle Style</button>

            <div class="section-box">
                <h3>✍️ Event Occasion</h3>
                <div class="row" style="margin-top: 8px;">
                    <input type="text" id="customText" placeholder="Event title (e.g., Summer Trip)">
                    <input type="color" id="customColor" value="#ff477e" style="width:60px; height:45px; border:none; cursor:pointer;">
                </div>
            </div>

            <button class="btn-action" id="downloadImgBtn">📥 Download Image</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('collageCanvas');
        const ctx = canvas.getContext('2d');
        let loadedImages = [];
        let currentLayout = 'grid';

        // Draw Logic
        function drawCollage() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#ffffff";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            loadedImages.forEach((imgObj) => {
                ctx.save();
                ctx.translate(imgObj.baseX, imgObj.baseY);
                ctx.rotate((imgObj.angle * Math.PI) / 180);
                ctx.drawImage(imgObj.element, -130, -130, 260, 260);
                ctx.restore();
            });

            // Draw Custom Title
            const title = document.getElementById('customText').value;
            if (title) {
                ctx.fillStyle = document.getElementById('customColor').value;
                ctx.fillRect(0, canvas.height - 80, canvas.width, 80);
                ctx.fillStyle = '#ffffff';
                ctx.font = 'bold 40px Arial';
                ctx.textAlign = 'center';
                ctx.fillText(title, canvas.width / 2, canvas.height - 35);
            }
        }

        // Event Listeners
        document.getElementById('imageInput').onchange = (e) => {
            Array.from(e.target.files).forEach(file => {
                const reader = new FileReader();
                reader.onload = (event) => {
                    const img = new Image();
                    img.onload = () => {
                        loadedImages.push({element: img, angle: Math.random() * 20 - 10, baseX: 400, baseY: 400});
                        drawCollage();
                    };
                    img.src = event.target.result;
                };
                reader.readAsDataURL(file);
            });
        };

        document.getElementById('customText').oninput = drawCollage;
        document.getElementById('customColor').oninput = drawCollage;
        document.getElementById('downloadImgBtn').onclick = () => {
            const link = document.createElement('a');
            link.download = 'my_collage.jpg';
            link.href = canvas.toDataURL('image/jpeg', 0.95);
            link.click();
        };
    </script>
</body>
</html>
